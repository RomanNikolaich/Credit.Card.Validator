# .github/workflows/test.yml
name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest  # ✅ Linux-окружение (бесплатно и быстро)

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Устанавливаем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # Ваша версия
          cache: 'yarn'       # Кэшируем зависимости

      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # 5. Запускаем e2e-тесты (с Puppeteer в headless)
      - name: Run e2e tests
        run: yarn e2e
        env:
          CI: true  # Важно для headless-режима